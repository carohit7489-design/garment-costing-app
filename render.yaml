services:
  - type: web
    name: garment-costing-app
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: garment-costing-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: OWNER_PASSWORD
        sync: false
