<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Production - Actual Consumption</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="top">
  <h1>Garment Costing Module</h1>
  <nav>
    <a href="production.html" class="active">Production - Actual Consumption</a>
  </nav>
</header>

<main>
  <section class="panel">
    <h2>Select Style</h2>
    <ul class="style-list" id="styleList"></ul>
  </section>

  <section class="panel" id="detailPanel">
    <div class="empty-state" id="emptyState">Select a style on the left to enter actual consumption.</div>

    <div id="detailContent" style="display:none;">
      <h2 id="formTitle">Style</h2>

      <div class="design-preview" id="designPreviewWrap" style="margin-bottom:16px;">
        <img id="designPreview" alt="Design preview" style="display:none;" />
        <span id="designPreviewEmpty">No design image uploaded</span>
      </div>

      <div class="summary-bar">
        <div>Buyer<strong id="infoBuyer">-</strong></div>
        <div>Season<strong id="infoSeason">-</strong></div>
        <div>Order Type<strong id="infoOrderType">-</strong></div>
        <div>Total Order Qty<strong id="infoTotalQty">-</strong></div>
      </div>

      <div class="form-grid" style="grid-template-columns: repeat(5, 1fr);">
        <div class="field">
          <label>Color</label>
          <select id="colorSelect"></select>
        </div>
        <div class="field">
          <label>Size</label>
          <select id="sizeSelect"></select>
        </div>
        <div class="field">
          <label>Actual Produced Qty (pcs)</label>
          <input id="actualQty" type="number" min="0" placeholder="e.g. 480" />
        </div>
        <div class="field">
          <label>Production Date</label>
          <input id="prodDate" type="date" />
        </div>
        <div class="field">
          <label>Filled By</label>
          <input id="filledBy" placeholder="e.g. Line Supervisor Name" />
        </div>
      </div>

      <div id="partsActualContainer"></div>

      <div class="actions-row">
        <div id="statusText" style="color:#64748b; font-size:12px;"></div>
        <button class="btn-primary" id="saveActualsBtn">Save Actual Consumption</button>
      </div>

      <div class="panel" style="margin-top:20px;">
        <h2>Previous Production Entries</h2>
        <div id="historyList" class="history-list"></div>
      </div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="production.js"></script>
</body>
</html>
